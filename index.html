<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Asset Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ════════════════════════════════════════
     SCREEN: PROFILES
     ════════════════════════════════════════ -->
<div id="screen-profiles" class="screen">

  <div class="topbar">
    <div class="brand">family<span>.</span>assets</div>
    <div class="topbar-right">
      <button class="btn btn-lang" id="lang-toggle" onclick="toggleLang()">🇹🇭 ภาษาไทย</button>
    </div>
  </div>

  <div class="profiles-wrap">
    <div class="page-heading" data-i18n="whoTracking">Who's tracking?</div>
    <div class="page-sub"     data-i18n="selectProfile">Select a profile to manage their assets.</div>
    <div class="profiles-grid" id="profiles-grid">
      <!-- Populated by profiles.js -->
    </div>
  </div>

</div><!-- /screen-profiles -->


<!-- ════════════════════════════════════════
     SCREEN: DASHBOARD
     ════════════════════════════════════════ -->
<div id="screen-dashboard" class="screen" style="display:none;">

  <div class="topbar">
    <div class="brand">family<span>.</span>assets</div>
    <div class="topbar-right">
      <button class="btn btn-lang" id="lang-toggle-dash" onclick="toggleLang()">🇹🇭 ภาษาไทย</button>
      <button class="btn-back" onclick="goBack()">
        <span data-i18n="allProfiles">← All Profiles</span>
      </button>
    </div>
  </div>

  <div class="dash-wrap">

    <!-- Profile header -->
    <div class="profile-header">
      <div class="ph-avatar" id="ph-avatar"></div>
      <div class="ph-info">
        <div class="ph-name" id="ph-name">—</div>
        <div class="ph-role" id="ph-role">—</div>
      </div>
    </div>

    <!-- Summary cards -->
    <div class="summary">
      <div class="sum-card sa">
        <div class="sum-label" data-i18n="totalAssets">Total Assets</div>
        <div class="sum-val"   id="s-assets">฿0.00</div>
      </div>
      <div class="sum-card se">
        <div class="sum-label" data-i18n="totalExpenses">Total Expenses</div>
        <div class="sum-val"   id="s-exp">฿0.00</div>
      </div>
      <div class="sum-card sn">
        <div class="sum-label" data-i18n="netValue">Net Value</div>
        <div class="sum-val"   id="s-net">฿0.00</div>
      </div>
    </div>

    <!-- Add asset form -->
    <div class="add-section">
      <div class="section-head" data-i18n="addAsset">+ Add Asset</div>

      <div class="form-grid">
        <div class="field">
          <label data-i18n="assetName">Asset Name</label>
          <input id="a-name" type="text" data-i18n="assetNamePH" data-i18n-attr="placeholder" placeholder="e.g. Gold, Condo, BTC…" />
        </div>
        <div class="field">
          <label data-i18n="amountLabel">Amount (฿)</label>
          <input id="a-amount" type="number" placeholder="0.00" step="0.01" min="0" />
        </div>
        <div class="field">
          <label data-i18n="expenseLabel">Expense (฿)</label>
          <input id="a-expense" type="number" placeholder="0.00" step="0.01" min="0" />
        </div>
        <div class="field">
          <label data-i18n="categoryLabel">Category</label>
          <select id="a-cat">
            <option value="stock"    data-i18n="catStock">📈 Stock</option>
            <option value="crypto"   data-i18n="catCrypto">₿ Crypto</option>
            <option value="property" data-i18n="catProperty">🏠 Property</option>
            <option value="cash"     data-i18n="catCash">💵 Cash</option>
            <option value="other"    data-i18n="catOther">📦 Other</option>
          </select>
        </div>
      </div>

      <div class="form-grid2">
        <div class="field">
          <label data-i18n="noteLabel">Note (optional)</label>
          <input id="a-note" type="text" data-i18n="notePH" data-i18n-attr="placeholder" placeholder="Short description…" />
        </div>
        <div class="field">
          <label data-i18n="imageLabel">Image (optional)</label>
          <div class="img-upload-area" id="img-drop">
            <input type="file" id="a-img" accept="image/*" onchange="handleAssetImg(this)" />
            <span id="img-label" data-i18n="uploadImage">📷 Upload image</span>
          </div>
        </div>
        <button class="btn btn-primary" onclick="addAsset()" data-i18n="addBtn">Add</button>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <input
        type="text"
        id="f-search"
        data-i18n="searchPH"
        data-i18n-attr="placeholder"
        placeholder="Search assets…"
        oninput="renderAssets()"
      />
      <select id="f-cat" onchange="renderAssets()">
        <option value=""         data-i18n="allCats">All Categories</option>
        <option value="stock"    data-i18n="catStock">Stock</option>
        <option value="crypto"   data-i18n="catCrypto">Crypto</option>
        <option value="property" data-i18n="catProperty">Property</option>
        <option value="cash"     data-i18n="catCash">Cash</option>
        <option value="other"    data-i18n="catOther">Other</option>
      </select>
      <span class="count" id="asset-count">0</span>
    </div>

    <!-- Assets grid -->
    <div class="assets-grid" id="assets-grid">
      <!-- Populated by dashboard.js -->
    </div>

    <!-- Bottom actions -->
    <div class="actions-row">
      <button class="btn btn-ghost  btn-sm" onclick="exportCSV()"   data-i18n="exportCSV">⬇ Export CSV</button>
      <button class="btn btn-danger btn-sm" onclick="clearAssets()" data-i18n="clearAll">🗑 Clear All</button>
    </div>

  </div>
</div><!-- /screen-dashboard -->


<!-- ════════════════════════════════════════
     MODAL: ADD PROFILE
     ════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-profile">
  <div class="modal">
    <div class="modal-title" data-i18n="newProfile">New Profile</div>

    <div class="avatar-upload">
      <div class="avatar-preview" id="new-avatar-preview">?</div>
      <div>
        <div class="avatar-upload-btn" onclick="document.getElementById('new-avatar-input').click()" data-i18n="uploadPhoto">
          📷 Upload Photo
        </div>
        <input type="file" id="new-avatar-input" accept="image/*" style="display:none" onchange="handleAvatarUpload(this)" />
        <div style="font-size:11px;color:var(--muted);margin-top:4px;" data-i18n="optional">Optional</div>
      </div>
    </div>

    <div class="field" style="margin-bottom:14px;">
      <label data-i18n="fullName">Full Name *</label>
      <input id="np-name" type="text" data-i18n="namePlaceholder" data-i18n-attr="placeholder" placeholder="e.g. Dad, Mom, Somchai…" />
    </div>

    <div class="field" style="margin-bottom:14px;">
      <label data-i18n="roleLabel">Role / Relation</label>
      <input id="np-role" type="text" data-i18n="rolePlaceholder" data-i18n-attr="placeholder" placeholder="e.g. Father, Mother, Son…" />
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost"   onclick="closeProfileModal()" data-i18n="cancel">Cancel</button>
      <button class="btn btn-primary" onclick="saveProfile()"       data-i18n="create">Create</button>
    </div>
  </div>
</div><!-- /modal-profile -->


<!-- ════════════════════════════════════════
     SCRIPTS  (order matters)
     ════════════════════════════════════════ -->
<script src="js/lang.js"></script>
<script src="js/app.js"></script>
<script src="js/profiles.js"></script>
<script src="js/dashboard.js"></script>
<script>
  // ── INIT ────────────────────────────────
  // Close modal when clicking overlay background
  document.getElementById("modal-profile").addEventListener("click", function(e) {
    if (e.target === this) closeProfileModal();
  });

  // Enter key shortcuts
  document.getElementById("np-name").addEventListener("keydown", e => { if (e.key === "Enter") saveProfile(); });
  document.getElementById("a-name") .addEventListener("keydown", e => { if (e.key === "Enter") addAsset(); });

  // Boot
  applyLang();
  renderProfiles();
</script>

</body>
</html>
